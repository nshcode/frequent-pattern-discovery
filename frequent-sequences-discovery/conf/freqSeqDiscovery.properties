#Relative minimum support (%)
#relativeMinSup=n that means n% of the sequences
relativeMinSup=1

#discoveryMode=init
discoveryMode=discovery

#Data
datasetName=freqEpisodes

#The absolute filename of the file containing the sequences
sequencesInputFile=C:\\Users\\nuhad\\Downloads\\Data\\sequences\\event-seq-3.csv

#The absolute filename of the file containing the event names in each sequence.
#This file will be produced by the algorithm in the mode INIT. 
eventNameSetsOutputFile=C:\\temp\\fSeq2\\eTypes3

#The absolute filename of the frequent event-names generated from the file "eventNameSetsOutputFile" 
#by a frequent item sets discovery algorithm as e.g. FpGrowth algorithm.
freqEventNamesInputFile=C:\\temp\\fSeq2\\eTypes3FreqItems

#The absolute directory name of the frequent event-name sets generated from the file "eventNameSetsOutputFile" 
#by a frequent item sets discovery algorithm as e.g. FpGrowth algorithm.
freqEventNameSetsInputDir=C:\\temp\\fSeq2\\

#The absolute output directory name that will contains the frequent sequences (frequent episodes) 
#generated by the algorithm in the mode DISCOVERY.
freqEpisodesOutputDir=C:\\temp\\outFSeq2

#To decide whether the generated frequent episodes will be written to one file 
# or each group of frequent episodes	having one frequent event name in common will have its own file.
outputFilePerFreqEvent=yes

#CSV
delimiter=,
quote="
escape=\\
skipHeader=yes
#skipHeader=no



